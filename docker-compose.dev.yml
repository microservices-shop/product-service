services:
  db:
    image: postgres:18
    container_name: db_dev
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shop_network

  migrator:
    build: .
    container_name: migrator_dev
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shop_network

  product-service:
    build: .
    container_name: product_service_dev
    env_file:
      - .env
    environment:
      - DB_HOST=db
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - shop_network
    restart: on-failure

volumes:
  db_data:

networks:
  shop_network:
    external: true
